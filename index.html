<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercy Shoe Store</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
    text-align: center;
}

header {
    background: black;
    color: white;
    padding: 20px;
}

.products {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.product {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
    width: 200px;
}

.product img {
    width: 100%;
}

button {
    background: green;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}

button:hover {
    background: darkgreen;
}
</style>

</head>
<body>

<header>
    <h1>Mercy Shoe Store</h1>
    <p>Quality shoes at the best prices</p>
</header>

<section class="products">

<div class="product">
    <img src="https://via.placeholder.com/200" alt="">
    <h2>Sport Sneakers</h2>
    <p>UGX 120,000</p>
    <button onclick="buyNow('Sport Sneakers')">Buy Now</button>
</div>

<div class="product">
    <img src="https://via.placeholder.com/200" alt="">
    <h2>Classic Heels</h2>
    <p>UGX 150,000</p>
    <button onclick="buyNow('Classic Heels')">Buy Now</button>
</div>

<div class="product">
    <img src="https://via.placeholder.com/200" alt="">
    <h2>Leather Shoes</h2>
    <p>UGX 200,000</p>
    <button onclick="buyNow('Leather Shoes')">Buy Now</button>
</div>

</section>

<footer>
    <p>Contact: 0752513603</p>
</footer>

<script>
function buyNow(shoe) {
    alert("You selected: " + shoe);
}
</script>

</body>
</html>
